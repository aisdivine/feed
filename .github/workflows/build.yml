name: Build feed

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (UTC)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths: ["build.py", "template.html", "sources.yml", ".github/workflows/build.yml"]

permissions:
  contents: write   # to commit the regenerated index.html

concurrency:
  group: build-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build index.html
        env:
          # Set this secret in repo Settings → Secrets and variables → Actions.
          # Leave it unset to run without the LLM layer (raw aggregation only).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set a repo *variable* FEED_MODEL to override the model.
          FEED_MODEL: ${{ vars.FEED_MODEL || 'claude-opus-4-8' }}
        run: python build.py

      - name: Commit if changed
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "feed: rebuild $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
